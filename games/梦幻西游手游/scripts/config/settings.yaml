    "min_action_gap": 3.0,    # 操作间隔(秒)
    "max_idle_time": 15.0,    # 随机发呆最长时间(秒)
    "random_swipe": True,     # 随机滑动
}

# 图像识别配置
CV = {
    "threshold": 0.80,         # 模板匹配阈值
    "wait_timeout": 30,       # 等待元素超时(秒)
